data_path: data/locomo/locomo10.json
dataset_name: locomo
run_dir: runs/qa_dashscope_f1fix
graph_dir: runs/build_dashscope/graphs

vector_store:
  path: runs/chroma_dashscope
  from_scratch: false

memory:
  k_turns: 4
  retrieval_topk: 5

graph:
  seed_top_k: 5
  max_hops: 2
  max_nodes: 20
  max_edges: 30
  retrieval_max_hop: 3
  jump_budget: 5
  final_answer_compression: true

llm:
  model: qwen3-4b
  # Read from OPENAI_API_KEY.
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_retries: 5
  disable_thinking: true
  use_extra_body_thinking: true

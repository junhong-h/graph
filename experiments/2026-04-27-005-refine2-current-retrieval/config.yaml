experiment:
  id: "2026-04-27-005"
  name: "refine2-current-retrieval"
  description: "Same-graph ablation：复用 004 Refine2 图和 Chroma，只用当前 HEAD 检索代码重跑 QA"
  branch: "refine-retrieval-construction"
  commit: "36c59ab"
  based_on: "2026-04-27-004"

data_path: data/locomo/locomo10.json
dataset_name: locomo
sample_ids: [conv-41, conv-26]

build:
  from_scratch: false
  k_turns: 4

graph:
  seed_top_k: 5
  max_hops: 2
  max_nodes: 20
  max_edges: 30
  retrieval_max_hop: 3
  jump_budget: 5
  final_answer_compression: false

memory:
  retrieval_topk: 5

llm:
  model: qwen3-4b
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_retries: 5
  disable_thinking: true
  use_extra_body_thinking: true
  # api_key: read from OPENAI_API_KEY env var

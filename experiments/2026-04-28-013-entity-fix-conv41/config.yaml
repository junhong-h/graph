experiment:
  id: "2026-04-28-013"          # e.g. 2026-04-27-001
  name: "entity-fix-conv41"            # e.g. refine-jump
  description: "补全 Entity 提取规则：所有命名人物/动物必须建 Entity 节点；conv-41 对比 012"
  branch: "fact-first-construction"                    # git branch name
  commit: "5345527"                    # git commit hash (short)
  based_on: "2026-04-28-012"                  # baseline experiment id, e.g. 2026-04-20-001

data_path: data/locomo/locomo10.json
dataset_name: locomo
sample_ids: [conv-41]                  # 留空 = 全量；指定则只跑这些，e.g. [conv-26, conv-30]

build:
  from_scratch: true
  k_turns: 999

graph:
  seed_top_k: 5
  max_hops: 2
  max_nodes: 20
  max_edges: 30
  retrieval_max_hop: 3
  jump_budget: 5
  final_answer_compression: false

memory:
  retrieval_topk: 5

llm:
  model: qwen3-4b
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  top_p: 0.7
  seed: 42
  max_retries: 5
  disable_thinking: true
  use_extra_body_thinking: true
  # api_key: read from OPENAI_API_KEY env var

experiment:
  id: "2026-04-27-002"
  name: "baseline-conv26"
  description: "commit 0408882 原始代码跑 conv-26，作为与 001 refine-jump 的同口径 baseline"
  branch: "refine-retrieval-construction"
  commit: "0408882"
  based_on: ""   # 本实验即 baseline

data_path: data/locomo/locomo10.json
dataset_name: locomo
sample_ids: [conv-26]

build:
  from_scratch: true
  k_turns: 4

graph:
  seed_top_k: 5
  max_hops: 2
  max_nodes: 20
  max_edges: 30
  retrieval_max_hop: 3
  jump_budget: 5
  final_answer_compression: false

memory:
  retrieval_topk: 5

llm:
  model: qwen3-4b
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_retries: 5
  disable_thinking: true
  use_extra_body_thinking: true
  # api_key: read from OPENAI_API_KEY env var

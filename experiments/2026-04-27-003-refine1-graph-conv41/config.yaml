experiment:
  id: "2026-04-27-003"
  name: "refine1-graph-conv41"
  description: "修复图构建质量：Entity 覆盖、Event isolation、multi-seed localizer、graph jump 修复，conv-41 单样本"
  branch: "refine-retrieval-construction"
  commit: "700b821"
  based_on: ""   # 参照 docs/report_progress_apr20.md（Apr 20 全量 baseline）

data_path: data/locomo/locomo10.json
dataset_name: locomo
sample_ids: [conv-41]

build:
  from_scratch: true
  k_turns: 4

graph:
  seed_top_k: 5
  max_hops: 2
  max_nodes: 20
  max_edges: 30
  retrieval_max_hop: 3
  jump_budget: 5
  final_answer_compression: false

memory:
  retrieval_topk: 5

llm:
  model: qwen3-4b
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_retries: 5
  disable_thinking: true
  use_extra_body_thinking: true
  # api_key: read from OPENAI_API_KEY env var
